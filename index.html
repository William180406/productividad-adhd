<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Sistema</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0ec;color:#1a1a1a;padding:12px;min-height:100vh}
.app{max-width:820px;margin:0 auto}
.tabs{display:flex;gap:2px;margin-bottom:1.25rem;background:#e2e1dc;padding:3px;border-radius:12px}
.tab{flex:1;padding:9px 4px;border:none;background:transparent;border-radius:9px;font-size:10px;cursor:pointer;color:#888;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;transition:all 0.15s}
.tab i{font-size:17px}
.tab.active{background:#fff;color:#1a1a1a;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.btn{padding:7px 13px;font-size:12px;border-radius:9px;background:#fff;border:1.5px solid #d0d0cc;cursor:pointer;font-weight:600;color:#1a1a1a;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;font-family:inherit;transition:all 0.1s}
.btn:hover{background:#f5f5f2;border-color:#aaa}
.btn:active{transform:scale(0.96)}
.btng{background:#1D9E75;color:#fff;border-color:#1D9E75}.btng:hover{background:#157a5a;border-color:#157a5a}
.btnp{background:#534AB7;color:#fff;border-color:#534AB7}.btnp:hover{background:#3d3890;border-color:#3d3890}
.btntg{background:#229ED9;color:#fff;border-color:#229ED9}.btntg:hover{background:#1a7fad;border-color:#1a7fad}
.btnw{background:#f59e0b;color:#fff;border-color:#f59e0b}.btnw:hover{background:#d4870a;border-color:#d4870a}
.btnr{background:#E24B4A;color:#fff;border-color:#E24B4A}.btnr:hover{background:#b83332;border-color:#b83332}
.inp{width:100%;padding:10px 13px;border-radius:9px;border:1.5px solid #d0d0cc;background:#fff;color:#1a1a1a;font-family:inherit;font-size:13px;transition:border 0.15s}
.inp:focus{border-color:#534AB7;outline:none;box-shadow:0 0 0 3px #534AB720}
.inp.err{border-color:#E24B4A;box-shadow:0 0 0 3px #E24B4A20}
.sel{padding:10px 11px;border-radius:9px;border:1.5px solid #d0d0cc;background:#fff;color:#1a1a1a;font-family:inherit;font-size:12px;cursor:pointer}
.sel:focus{border-color:#534AB7;outline:none}
.card{background:#fff;border:1.5px solid #e0e0da;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.pw{height:8px;border-radius:99px;background:#e8e8e2;overflow:hidden}
.pf{height:100%;border-radius:99px;transition:width 0.6s cubic-bezier(.34,1.56,.64,1)}
.xw{height:9px;border-radius:99px;background:#e0dff5;overflow:hidden;margin:4px 0}
.xf{height:100%;border-radius:99px;background:linear-gradient(90deg,#534AB7,#7c6fd4);transition:width 0.6s ease}
.badge{font-size:10px;padding:3px 8px;border-radius:99px;font-weight:700;white-space:nowrap;flex-shrink:0}
/* TASK GRID CARDS */
.task-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:4px}
@media(max-width:500px){.task-grid{grid-template-columns:1fr}}
.trow{display:flex;flex-direction:column;padding:16px;border-radius:16px;background:#fff;border:2px solid #e0e0da;border-top:6px solid #534AB7;transition:all 0.18s;box-shadow:0 4px 16px rgba(0,0,0,0.07);aspect-ratio:1/1}
.trow:hover{box-shadow:0 8px 28px rgba(0,0,0,0.13);transform:translateY(-3px)}
.trow.t-wait{border-top-color:#229ED9;background:linear-gradient(160deg,#fff 70%,#edf5fd)}
.trow.t-done{border-top-color:#1D9E75;background:linear-gradient(160deg,#fff 70%,#edfaf5);opacity:0.65}
.trow.t-venc{border-top-color:#E24B4A;background:linear-gradient(160deg,#fff 70%,#fff5f5)}
.trow-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.ttxt{font-size:15px;color:#1a1a1a;word-break:break-word;line-height:1.45;font-weight:700;flex:1}
.tdone-txt{text-decoration:line-through;color:#bbb!important;font-weight:500!important}
.tmeta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.tactions{display:flex;gap:2px;align-items:center;flex-shrink:0}
.ico-btn{background:none;border:none;cursor:pointer;padding:5px;border-radius:7px;display:flex;align-items:center;color:#ccc;transition:all 0.1s}
.ico-btn:hover.edit{color:#534AB7;background:#f0effe}
.ico-btn:hover.del{color:#E24B4A;background:#fff0f0}
.sb{font-size:11px;padding:3px 9px;border-radius:99px;border:1.5px solid #e0e0da;background:#f5f5f2;color:#888;cursor:pointer;font-family:inherit;transition:all 0.1s;font-weight:500}
.sb:hover{border-color:#aaa;color:#444;background:#ebebeb}
.sb-todo{border-color:#534AB7;background:#f0effe;color:#534AB7;font-weight:700}
.sb-wait{border-color:#229ED9;background:#edf5fd;color:#229ED9;font-weight:700}
.sb-done{border-color:#1D9E75;background:#edfaf5;color:#1D9E75;font-weight:700}
/* PROYECTOS */
.cat-hdr{display:flex;align-items:center;gap:9px;padding:11px 14px;border-radius:12px;cursor:pointer;margin-bottom:8px;border:1.5px solid transparent;transition:all 0.15s}
.cat-hdr:hover{opacity:0.9}
.proj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding-left:0;align-items:start}
@media(max-width:500px){.proj-grid{grid-template-columns:1fr}}
.proj-card{background:#fff;border:2px solid #e0e0da;border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.07);display:flex;flex-direction:column;transition:all 0.18s}
.proj-card:hover{box-shadow:0 8px 28px rgba(0,0,0,0.12)}
.proj-hdr{padding:11px 14px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:background 0.1s}
.proj-hdr:hover{background:#fafaf8}
.proj-body{padding:8px 14px 13px;border-top:1.5px solid #f0f0ec}
.sub-row{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;margin-bottom:3px;transition:background 0.1s}
.sub-row:hover{background:#f5f5f2}
/* POMODORO */
.pom-ring{width:200px;height:200px;margin:0 auto 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.pom-time{font-size:50px;font-weight:200;letter-spacing:3px;line-height:1}
.pom-svg{position:absolute;top:0;left:0;width:100%;height:100%;transform:rotate(-90deg)}
.brain-area{width:100%;min-height:150px;padding:13px;border-radius:10px;border:1.5px solid #d0d0cc;background:#fffdf5;color:#1a1a1a;font-family:inherit;font-size:13px;line-height:1.7;resize:vertical}
.brain-area:focus{border-color:#534AB7;outline:none}
/* MODAL */
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.35);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
/* STATS */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:13px}
.stat{background:#fff;border:1.5px solid #e0e0da;border-radius:11px;padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.stat-v{font-size:22px;font-weight:800}
.stat-l{font-size:10px;color:#888;margin-top:2px;font-weight:500}
.csec{border:1.5px solid #e0e0da;border-radius:14px;padding:14px;margin-bottom:12px;background:#fff;box-shadow:0 1px 5px rgba(0,0,0,0.04)}
.lvbadge{display:inline-flex;align-items:center;gap:5px;background:#f0effe;border:1.5px solid #7c6fd4;border-radius:99px;padding:5px 12px;font-size:12px;font-weight:700;color:#534AB7}
.skbadge{display:inline-flex;align-items:center;gap:5px;background:#fff8eb;border:1.5px solid #f59e0b;border-radius:99px;padding:5px 12px;font-size:12px;font-weight:700;color:#d4870a}
.empty{text-align:center;color:#ccc;font-size:13px;padding:28px 0}
.fb{font-size:11px;padding:5px 12px;border-radius:99px;border:1.5px solid #d0d0cc;background:#fff;color:#888;cursor:pointer;font-family:inherit;transition:all 0.1s;font-weight:500}
.fb:hover{border-color:#888;color:#444}
.fb.act{background:#534AB7;color:#fff;border-color:#534AB7;font-weight:700}
input[type=date],input[type=time]{padding:9px 11px;border-radius:9px;border:1.5px solid #d0d0cc;background:#fff;color:#1a1a1a;font-family:inherit;font-size:12px}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0;accent-color:#1D9E75}
@keyframes pop{0%{opacity:0;transform:scale(0.8)}60%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;margin:0;padding:0;height:0}}
.cel{padding:12px 16px;background:linear-gradient(135deg,#f0effe,#edfaf5);border:1.5px solid #7c6fd4;border-radius:12px;margin-bottom:12px;font-size:13px;font-weight:700;color:#534AB7;animation:pop 0.3s ease,fadeOut 4s ease 1.5s forwards;display:flex;align-items:center;gap:10px}
.errmsg{font-size:11px;color:#E24B4A;font-weight:600;margin-top:5px;display:flex;align-items:center;gap:4px;animation:pop 0.2s ease}
.dv{border:none;border-top:1.5px solid #f0f0ec;margin:10px 0}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
</style>

<body>
<canvas id="confetti-canvas"></canvas>
<div class="app"><div id="root"></div></div>
<div id="modal-root"></div>
 
<script>
// ── CONFETTI ─────────────────────────────────────────────────
function launchConfetti(){
  const cv=document.getElementById('confetti-canvas');
  const ctx=cv.getContext('2d');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const cols=['#534AB7','#1D9E75','#f59e0b','#E24B4A','#229ED9','#7c6fd4','#4dc99a','#f472b6'];
  const pieces=Array.from({length:130},()=>({
    x:Math.random()*cv.width,y:-10,
    w:Math.random()*10+5,h:Math.random()*6+4,
    color:cols[Math.floor(Math.random()*cols.length)],
    rot:Math.random()*360,
    vx:(Math.random()-0.5)*5,vy:Math.random()*5+2,vr:(Math.random()-0.5)*9
  }));
  let f=0;
  (function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    pieces.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.globalAlpha=Math.max(0,1-f/100);ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=0.08;});
    if(++f<130)requestAnimationFrame(draw);else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}
 
// ── CONSTANTES ───────────────────────────────────────────────
const PCOLS=['#534AB7','#1D9E75','#E24B4A','#229ED9','#f59e0b','#D4537E','#0E7C7B','#8B5E3C'];
const LVLS=[{x:0,n:'Arrancando 🐣'},{x:50,n:'Despertando 👀'},{x:150,n:'Enfocado 🎯'},{x:300,n:'En ritmo 🔥'},{x:500,n:'Imparable 💪'},{x:750,n:'Máquina ⚡'},{x:1050,n:'Maestro 🧠'},{x:1400,n:'Leyenda 🏆'},{x:1800,n:'Élite 👑'},{x:2300,n:'DIOS MODE 🌟'}];
const CATS={business:{label:'Business',color:'#229ED9',bg:'#edf5fd',icon:'ti-briefcase'},personal:{label:'Personal',color:'#1D9E75',bg:'#edfaf5',icon:'ti-home'}};
const SK='adhd_v7';
const FUNNY=[
  '¡Lo hiciste! Y el mundo sigue girando 🌍','BOOM. Tachado. Así se hace 💥',
  '¿Ves? Tu cerebro SÍ funciona 🧠✨','Otro más al cementerio de pendientes 💀',
  'Eso que sientes se llama productividad 😎','¡Toma dopamina gratis! Te la ganaste 🎁',
  'Tu yo del futuro te lo agradece 🙏','¡GOLAZO! ¿Quién dijo ADHD? 🥅⚽',
  'Pequeño paso, gigante avance 🚀','Así se construyen imperios. Una tarea a la vez 👑'
];
const TG_COMP=[
  '✅ Hecho: "{t}"\n\n💪 Cada cosa que tachas es una promesa que te cumples a ti mismo.\n\n🔥 Racha: {s} días | ⚡ {xp} XP acumulados',
  '🎯 "{t}" — COMPLETADA.\n\nNo es suerte. Es que eres capaz. Siempre lo fuiste.\n\n🔥 {s} días de racha | Nv.{lv}',
  '💥 "{t}" — tachada.\n\nEstás construyendo la mejor versión de ti. Un paso a la vez.\n\n⚡ {xp} XP | 🔥 {s} días seguidos',
  '✅ "{t}"\n\nCada tarea completada es evidencia de que puedes con esto.\n\n🏆 {xp} XP | Racha: {s} días'
];
const TG_DAILY=[
  '☀️ Nuevo día. {todo} razones para arrancar.\n\n📋 Por hacer: {todo} | ⏳ Esperando: {wait}{ovd}\n\n🔥 Racha: {s} días — no la rompas hoy.\n⚡ {lvn}',
  '🌅 Buenos días.\n\n📋 {todo} por hacer | ⏳ {wait} esperando{ovd}\n\nNo tienes que hacerlo todo perfecto. Solo tienes que hacerlo.\n\n🔥 {s} días seguidos. Eso ya es parte de ti.',
  '☀️ Revisión diaria.\n\n{todo} tareas pendientes · {wait} esperando respuesta{ovd}\n\n¿Cuál es la que más te pesa? Esa empieza primero.\n🔥 Racha: {s} días'
];
const TG_OVD=[
  '⚠️ Llevas {d} día{ds} sin resolver:\n"{t}"\n\nNo te juzgo. Solo te recuerdo que puedes hoy.',
  '🔔 "{t}" lleva {d} día{ds} esperando.\n\nCada día se siente más pesada. Hoy es buen día para quitártela.',
  '⏰ {d} día{ds} y esta sigue aquí:\n"{t}"\n\n¿10 minutos hoy? Solo 10.'
];
const TG_PUSH=[
  '🚀 Recuerda que cada tarea que completas es un ladrillo más en tu negocio.\n\nAhora mismo tienes esto pendiente:\n{tareas}\n\n¿Cuál puedes atacar en los próximos 20 minutos?',
  '💡 Los negocios que crecen no tienen dueños que esperan el momento perfecto — tienen dueños que actúan ahora.\n\nNo olvides estas tareas:\n{tareas}\n\n🔥 Racha: {s} días',
  '⚡ Check rápido cada 20 min:\n\n{tareas}\n\nCada una de esas es dinero, tiempo y crecimiento esperando a que las ejecutes.',
  '🎯 Los grandes negocios se construyen con acciones pequeñas y consistentes.\n\nEstas son las tuyas ahora:\n{tareas}\n\n¿Qué resuelves primero?',
  '💰 Tu negocio no crece solo. Crece cada vez que tú actúas.\n\nTareas al frente:\n{tareas}\n\n🔥 {s} días de racha. No pares ahora.',
  '🧠 Recordatorio de tu cerebro externo:\n\n{tareas}\n\nUna de estas puede cambiar el rumbo de tu semana. Elige una y comienza.',
  '📈 Los emprendedores que ganan no son los más inteligentes — son los más consistentes.\n\nTienes esto pendiente:\n{tareas}\n\n⚡ Nv.{lv}: {lvn}',
  '🔑 Cada tarea completada acerca tu negocio a donde quieres llevarlo.\n\nEn tu lista ahora:\n{tareas}\n\n💪 Tú construiste esto. Tú lo vas a crecer.',
  '⏰ Han pasado 20 minutos. ¿Qué avanzaste?\n\nSi la respuesta es "nada", aquí hay opciones:\n{tareas}\n\n🔥 No juzgo. Solo te recuerdo que puedes.',
  '🌟 Tu negocio es el reflejo de tus acciones diarias.\n\nEstas tareas te están esperando:\n{tareas}\n\n¿Cuál de todas te genera más impacto si la haces HOY?'
];
 
 
// ── ESTADO ───────────────────────────────────────────────────
let S={
  tasks:[],subtasks:[],
  projects:[
    {id:'p-work',name:'Trabajo',color:'#229ED9',category:'business'},
    {id:'p-personal',name:'Personal',color:'#1D9E75',category:'personal'}
  ],
  notas:'',
  g:{xp:0,level:1,streak:0,lastDate:''},
  pom:{secs:1500,running:false,sessions:0,mode:'work'},
  cfg:{token:'',chatId:'',dailyTime:'09:00',enabled:false,lastDaily:''}
};
let tab='main',filt='activas',celMsg='';
let openProjs={},openCats={business:true,personal:true};
let pomInt=null;
let editTask=null,editProj=null;
 
// ── UTILS ────────────────────────────────────────────────────
const gid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const today=()=>new Date().toISOString().split('T')[0];
const todayStr=()=>new Date().toDateString();
const fmtDate=d=>{if(!d)return'';return new Date(d+'T12:00:00').toLocaleDateString('es',{day:'numeric',month:'short'})};
const fmtSecs=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
const daysAgo=d=>Math.max(0,Math.floor((Date.now()-new Date(d+'T00:00:00'))/864e5));
const isOD=t=>t.dueDate&&t.status!=='done'&&t.dueDate<today();
const pCol=p=>p?(p.color||PCOLS[Math.max(0,S.projects.findIndex(x=>x.id===p.id))%PCOLS.length]):'#aaa';
const rnd=arr=>arr[Math.floor(Math.random()*arr.length)];
const getLv=xp=>{let l=0;LVLS.forEach((v,i)=>{if(xp>=v.x)l=i});return l+1};
const getLvName=xp=>{let l=0;LVLS.forEach((v,i)=>{if(xp>=v.x)l=i});return LVLS[l].n};
const getLvPct=xp=>{const l=getLv(xp)-1,c=LVLS[l]?.x||0,n=LVLS[l+1]?.x;return n?Math.min(100,Math.round((xp-c)/(n-c)*100)):100};
 
// ── PERSISTENCIA ─────────────────────────────────────────────
function load(){
  try{const d=localStorage.getItem(SK);if(d)Object.assign(S,JSON.parse(d));}catch(e){}
  S.tasks=(S.tasks||[]).map(t=>({...t,status:t.status||(t.kanbanStatus==='done'?'done':t.kanbanStatus==='waiting'?'wait':'todo'),dueDate:t.dueDate||today()}));
  S.projects=(S.projects||[]).map(p=>({...p,category:p.category||(p.id==='p-personal'||p.id==='personal'?'personal':'business')}));
  if(!S.subtasks)S.subtasks=[];if(!S.notas)S.notas='';
  if(!S.g)S.g={xp:0,level:1,streak:0,lastDate:''};
  if(!S.pom)S.pom={secs:1500,running:false,sessions:0,mode:'work'};
  if(!S.cfg||!('token' in S.cfg))S.cfg={token:'',chatId:'',dailyTime:'09:00',enabled:false,lastDaily:''};
  const td=todayStr();
  if(S.g.lastDate!==td){const yd=new Date(Date.now()-864e5).toDateString();S.g.streak=S.g.lastDate===yd?S.g.streak+1:1;S.g.lastDate=td;save();}
  S.pom.running=false;
}
function save(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}
 
// ── TELEGRAM ─────────────────────────────────────────────────
async function tg(txt){
  const{token,chatId,enabled}=S.cfg;if(!token||!chatId||!enabled)return;
  try{await fetch(`https://api.telegram.org/bot${token}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:chatId,text:txt,parse_mode:'HTML'})});}catch(e){}
}
async function checkRem(){
  if(!S.cfg.enabled||!S.cfg.token||!S.cfg.chatId)return;
  const now=new Date(),td=todayStr();
  if(S.cfg.dailyTime&&S.cfg.lastDaily!==td){
    const[h,m]=S.cfg.dailyTime.split(':').map(Number);
    if(now.getHours()*60+now.getMinutes()>=h*60+m){
      const todo=S.tasks.filter(t=>t.status==='todo').length;
      const wait=S.tasks.filter(t=>t.status==='wait').length;
      const ovd=S.tasks.filter(t=>isOD(t)).length;
      const ovdStr=ovd?`\n⚠️ ${ovd} vencida${ovd!==1?'s':''}`:' ';
      const msg=rnd(TG_DAILY).replace(/\{todo\}/g,todo).replace(/\{wait\}/g,wait).replace(/\{ovd\}/g,ovdStr).replace(/\{s\}/g,S.g.streak).replace(/\{lv\}/g,S.g.level).replace(/\{lvn\}/g,getLvName(S.g.xp));
      await tg(msg);S.cfg.lastDaily=td;save();
    }
  }
  const ovds=S.tasks.filter(t=>isOD(t)&&!t.tgSent);
  for(const t of ovds){const d=daysAgo(t.dueDate);await tg(rnd(TG_OVD).replace(/\{t\}/g,t.text).replace(/\{d\}/g,d).replace(/\{ds\}/g,d!==1?'s':''));t.tgSent=true;}
  if(ovds.length)save();
}
 
async function push20(){
  if(!S.cfg.enabled||!S.cfg.token||!S.cfg.chatId)return;
  // Get all pending tasks (todo + wait)
  const pending=S.tasks.filter(t=>t.status!=='done');
  if(!pending.length)return;
  // Pick 3-5 random tasks to mention
  const shuffled=[...pending].sort(()=>Math.random()-0.5);
  const picked=shuffled.slice(0,Math.min(5,shuffled.length));
  const taskLines=picked.map(t=>{
    const proj=S.projects.find(p=>p.id===t.projectId);
    const projName=proj?` [${proj.name}]`:'';
    const flag=isOD(t)?'⚠️':t.status==='wait'?'⏳':'📋';
    return`${flag} ${t.text}${projName}`;
  }).join('\n');
  const msg=rnd(TG_PUSH)
    .replace(/\{tareas\}/g,taskLines)
    .replace(/\{s\}/g,S.g.streak)
    .replace(/\{lv\}/g,S.g.level)
    .replace(/\{lvn\}/g,getLvName(S.g.xp));
  await tg(msg);
}
 
// ── POMODORO ─────────────────────────────────────────────────
function startPom(){
  if(pomInt)return;S.pom.running=true;save();
  pomInt=setInterval(async()=>{
    if(S.pom.secs>0){
      S.pom.secs--;
      const el=document.getElementById('ptd');if(el)el.textContent=fmtSecs(S.pom.secs);
      const tot=S.pom.mode==='work'?1500:300,circ=2*Math.PI*85;
      const c=document.getElementById('pc');if(c)c.style.strokeDashoffset=circ-(circ*(1-S.pom.secs/tot));
      if(S.pom.secs%30===0)save();
    }else{
      clearInterval(pomInt);pomInt=null;S.pom.running=false;S.pom.sessions++;
      if(S.pom.mode==='work'){S.pom.mode='break';S.pom.secs=300;tg('🍅 <b>25 minutos completados.</b>\nDescansa 5 min. Te lo ganaste.\n\nCada pomodoro es una inversión en ti mismo. 💪');}
      else{S.pom.mode='work';S.pom.secs=1500;tg('⚡ <b>Descanso terminado.</b>\n¿Listo para el siguiente round?\n\nRecuerda: no necesitas motivación para empezar. Solo necesitas empezar.');}
      save();render();
    }
  },1000);render();
}
function pausePom(){clearInterval(pomInt);pomInt=null;S.pom.running=false;save();render();}
function resetPom(){clearInterval(pomInt);pomInt=null;S.pom.running=false;S.pom.secs=S.pom.mode==='work'?1500:300;save();render();}

    S.g.level=nl;celMsg=`¡SUBISTE A ${getLvName(S.g.xp).toUpperCase()}! Tu cerebro ADHD acaba de desbloquear un nuevo nivel 🔓`;

    tg(`🏆 <b>¡NUEVO NIVEL!</b>\nAhora eres: <b>${getLvName(S.g.xp)}</b>\n\nEsto no es un juego — esto es tu vida cambiando.\nSigue así. 💪\n\n⚡ ${S.g.xp} XP acumulados`);
  }else{celMsg=rnd(FUNNY);launchConfetti();}
  save();
}

  const txt=document.getElementById('nt')?.value?.trim();
  const proj=document.getElementById('np')?.value||'';
  const errEl=document.getElementById('np-err');
  const inpEl=document.getElementById('np');
  if(!proj){
    if(inpEl)inpEl.classList.add('err');

    setTimeout(()=>{if(inpEl)inpEl.classList.remove('err');if(errEl)errEl.style.display='none';},3000);
    return;
  }
  if(!txt){document.getElementById('nt')?.classList.add('err');setTimeout(()=>document.getElementById('nt')?.classList.remove('err'),2000);return;}
  S.tasks.push({id:gid(),text:txt,projectId:proj,status:'todo',dueDate:today(),createdAt:new Date().toISOString()});
  document.getElementById('nt').value='';save();render();setTimeout(()=>document.getElementById('nt')?.focus(),40);

async function setStatus(id,st){
  const t=S.tasks.find(x=>x.id===id);if(!t)return;
  const prev=t.status;t.status=st;
  if(st==='done'&&prev!=='done'){
    t.doneDate=todayStr();await gainXP(15);
    tg(rnd(TG_COMP).replace(/\{t\}/g,t.text).replace(/\{s\}/g,S.g.streak).replace(/\{xp\}/g,S.g.xp).replace(/\{lv\}/g,S.g.level));
  }else if(st!=='done'){delete t.doneDate;delete t.tgSent;}
  save();render();
}

function vProj(p){
  const subs=S.subtasks.filter(s=>s.projectId===p.id);
  let projTasks=S.tasks.filter(t=>t.projectId===p.id);
  const doneSubs=subs.filter(s=>s.done).length;
  const doneTasks=projTasks.filter(t=>t.status==='done').length;
  const totalItems=subs.length+projTasks.length;
  const doneItems=doneSubs+doneTasks;
  const pct=totalItems?Math.round(doneItems/totalItems*100):0;
  const col=pCol(p);
  const isOpen=!!openProjs[p.id];
  const pendTasks=projTasks.filter(t=>t.status==='todo').length;
  const waitTasks=projTasks.filter(t=>t.status==='wait').length;
  const pendSubs=subs.filter(s=>!s.done).length;
 
  if(filt==='todo')projTasks=projTasks.filter(t=>t.status==='todo');
  else if(filt==='wait')projTasks=projTasks.filter(t=>t.status==='wait');
  else if(filt==='venc')projTasks=projTasks.filter(t=>isOD(t));
  else if(filt==='done')projTasks=projTasks.filter(t=>t.status==='done');
  else projTasks=projTasks.filter(t=>t.status!=='done');
 
  // Square card — always visible summary, expand for details
  return`<div class="proj-card" style="border-top:6px solid ${col}">
  <div style="padding:16px;flex:1;display:flex;flex-direction:column;overflow:hidden">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
        <span style="width:10px;height:10px;border-radius:50%;background:${col};flex-shrink:0;box-shadow:0 0 7px ${col}80"></span>
        <span style="font-size:15px;font-weight:800;color:#1a1a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}</span>
      </div>
      <div style="display:flex;gap:2px;flex-shrink:0;margin-left:4px">
        <button class="ico-btn edit" onclick="openEditProj('${p.id}')" title="Editar"><i class="ti ti-pencil" style="font-size:13px"></i></button>
        <button class="ico-btn del" onclick="delProj('${p.id}')" title="Eliminar"><i class="ti ti-trash" style="font-size:13px"></i></button>
      </div>
    </div>
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:700;margin-bottom:5px">
        <span style="color:#aaa">${doneItems}/${totalItems} completados</span>
        <span style="color:${col}">${pct}%</span>
      </div>
      <div class="pw" style="height:8px;border-radius:99px"><div class="pf" style="width:${pct}%;background:${col}"></div></div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      ${pendTasks?`<span class="badge" style="background:#f0effe;color:#534AB7;border:1.5px solid #534AB720">📋 ${pendTasks} tarea${pendTasks!==1?'s':''}</span>`:''}
      ${waitTasks?`<span class="badge" style="background:#edf5fd;color:#229ED9;border:1.5px solid #229ED920">⏳ ${waitTasks}</span>`:''}
      ${pendSubs?`<span class="badge" style="background:#f5f5f2;color:#888;border:1.5px solid #e0e0da">🔧 ${pendSubs} paso${pendSubs!==1?'s':''}</span>`:''}
      ${totalItems===0?`<span style="font-size:11px;color:#ccc">Sin tareas aún</span>`:''}
    </div>
    <div style="margin-top:auto">
      <button onclick="togProj('${p.id}')" style="width:100%;padding:8px;border-radius:9px;border:1.5px solid ${col}30;background:${col}10;color:${col};font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px">
        <i class="ti ti-${isOpen?'chevron-up':'chevron-down'}" style="font-size:13px"></i>
        ${isOpen?'Cerrar':'Ver detalles'}
      </button>
    </div>
  </div>
  ${isOpen?`<div style="border-top:2px solid #f0f0ec;padding:14px;background:#fafaf8">
    ${subs.length?`<div style="margin-bottom:12px">
      <div style="font-size:10px;color:#aaa;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px">Pasos</div>
      ${subs.map(s=>`<div class="sub-row">
        <input type="checkbox" ${s.done?'checked':''} onchange="togSub('${s.id}')" style="accent-color:${col};width:15px;height:15px;cursor:pointer;flex-shrink:0" />
        <span style="flex:1;font-size:12px;color:${s.done?'#bbb':'#1a1a1a'};font-weight:${s.done?'400':'500'};${s.done?'text-decoration:line-through':''}">${esc(s.text)}</span>
        <button class="ico-btn edit" onclick="openEditSub('${s.id}')" title="Editar"><i class="ti ti-pencil" style="font-size:12px"></i></button>
        <button class="ico-btn del" onclick="delSub('${s.id}')" title="Eliminar"><i class="ti ti-x" style="font-size:12px"></i></button>
      </div>`).join('')}
    </div>`:''}
    ${projTasks.length?`<div style="margin-bottom:12px">
      <div style="font-size:10px;color:#aaa;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">Tareas</div>
      <div class="task-grid">${projTasks.map(t=>vTask(t)).join('')}</div>
    </div>`:''}
    <div class="dv"></div>
    <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
      <input type="text" id="si-${p.id}" class="inp" placeholder="Agregar paso..." style="flex:1;font-size:12px;padding:8px 11px" onkeydown="if(event.key==='Enter')addSub('${p.id}')" />
      <button class="btn btng" style="padding:8px 12px;font-size:12px" onclick="addSub('${p.id}')"><i class="ti ti-plus"></i></button>
    </div>
  </div>`:''}
</div>`;
}
 
 
// ── TAB POMODORO ─────────────────────────────────────────────
function vPom(){
  const iW=S.pom.mode==='work';const col=iW?'#534AB7':'#1D9E75';
  const tot=iW?1500:300,r=85,circ=2*Math.PI*r;
  const offset=circ-(circ*(1-S.pom.secs/tot));
  return`
<div class="card" style="text-align:center;padding:24px">
  <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:${col};margin-bottom:16px">${iW?'⚡ Sesión de trabajo':'☕ Descanso'} — Sesión ${S.pom.sessions+1}</div>
  <div class="pom-ring">
    <svg class="pom-svg" viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="${r}" fill="none" stroke="${col}15" stroke-width="10"/>
      <circle id="pc" cx="100" cy="100" r="${r}" fill="none" stroke="${col}" stroke-width="10"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
        style="transition:stroke-dashoffset 1s linear;filter:drop-shadow(0 0 5px ${col}60)"/>
    </svg>
    <div id="ptd" class="pom-time" style="color:${col}">${fmtSecs(S.pom.secs)}</div>
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:${col};margin-top:6px;opacity:0.7">${iW?'Trabaja':'Descansa'}</div>
  </div>
  <div style="display:flex;gap:8px;justify-content:center;margin-bottom:${S.pom.sessions?'12px':'0'}">
    ${!S.pom.running
      ?`<button class="btn btnp" style="padding:12px 28px;font-size:14px" onclick="startPom()"><i class="ti ti-player-play"></i>Iniciar 25 min</button>`
      :`<button class="btn" style="padding:12px 28px;font-size:14px" onclick="pausePom()"><i class="ti ti-player-pause"></i>Pausar</button>`}
    <button class="btn" style="padding:12px 16px" onclick="resetPom()"><i class="ti ti-refresh"></i></button>
  </div>
  ${S.pom.sessions?`<div style="font-size:12px;color:#aaa;font-weight:500">${S.pom.sessions} pomodoro${S.pom.sessions!==1?'s':''} hoy 🍅</div>`:''}
</div>
<div class="card">
  <div style="font-size:13px;font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:7px"><i class="ti ti-brain" style="color:#534AB7;font-size:16px"></i>Descarga mental</div>
  <p style="font-size:12px;color:#aaa;margin-bottom:10px;line-height:1.5">Vacía tu cabeza aquí. Sin estructura, sin juzgarte. Solo escribe lo que tienes dentro.</p>
  <textarea class="brain-area" placeholder="¿Qué te está pesando ahora mismo?&#10;¿Qué no puedes olvidar?&#10;¿Qué urge?&#10;&#10;Todo va aquí." oninput="S.notas=this.value;save()">${esc(S.notas)}</textarea>
  <div style="display:flex;justify-content:flex-end;margin-top:8px">
    <button class="btn" style="font-size:11px;padding:5px 11px;color:#aaa" onclick="if(confirm('¿Limpiar el bloc?')){S.notas='';save();render();}"><i class="ti ti-trash" style="font-size:11px"></i>Limpiar</button>
  </div>
</div>`;
}

// ── TELEGRAM CONFIG ───────────────────────────────────────────
async function getChatId(){
  const tok=document.getElementById('tok')?.value?.trim();const m=document.getElementById('tm');
  if(!tok){if(m){m.textContent='Ingresa el token primero';m.style.color='#E24B4A';}return;}
  if(m){m.textContent='Buscando...';m.style.color='#888';}
  try{
    const r=await fetch(`https://api.telegram.org/bot${tok}/getUpdates`);const d=await r.json();
    if(!d.ok){if(m){m.textContent='Token inválido';m.style.color='#E24B4A';}return;}
    if(!d.result?.length){if(m){m.textContent='Envía un mensaje al bot primero';m.style.color='#f59e0b';}return;}
    const cid=String(d.result[d.result.length-1].message?.chat?.id||'');
    if(!cid){if(m){m.textContent='No se encontró Chat ID';m.style.color='#f59e0b';}return;}
    document.getElementById('cid').value=cid;
    if(m){m.textContent='✓ Chat ID: '+cid;m.style.color='#1D9E75';}
  }catch(e){if(m){m.textContent='Error de conexión';m.style.color='#E24B4A';}}
}
function saveCfg(){
  S.cfg.token=document.getElementById('tok')?.value?.trim()||'';
  S.cfg.chatId=document.getElementById('cid')?.value?.trim()||'';
  S.cfg.dailyTime=document.getElementById('dtime')?.value||'09:00';
  S.cfg.enabled=document.getElementById('ena')?.checked||false;
  save();const m=document.getElementById('tm');
  if(m){m.textContent='Guardado ✓';m.style.color='#1D9E75';setTimeout(()=>{if(m)m.textContent=''},3000);}render();
}
async function testTG(){
  const tok=document.getElementById('tok')?.value?.trim();const cid=document.getElementById('cid')?.value?.trim();const m=document.getElementById('tm');
  if(!tok||!cid){if(m){m.textContent='Necesitas token y Chat ID';m.style.color='#E24B4A';}return;}
  if(m){m.textContent='Enviando...';m.style.color='#888';}
  try{
    const r=await fetch(`https://api.telegram.org/bot${tok}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:cid,parse_mode:'HTML',text:`🚀 <b>Tu sistema está activo.</b>\n\nEstas notificaciones son para recordarte que estás construyendo algo real, un día a la vez.\n\n🔥 Racha: ${S.g.streak} días\n⚡ ${getLvName(S.g.xp)} (Nv.${S.g.level})\n📋 Por hacer: ${S.tasks.filter(t=>t.status==='todo').length}\n⏳ Esperando: ${S.tasks.filter(t=>t.status==='wait').length}\n\n⏱️ Recibirás un recordatorio motivador cada 20 minutos con tus tareas al frente. Tú puedes con esto. 💪`})});
    const d=await r.json();
    if(d.ok){if(m){m.textContent='Revisa Telegram ✓';m.style.color='#1D9E75';setTimeout(()=>{if(m)m.textContent=''},5000);}}
    else{if(m){m.textContent='Error: '+(d.description||'');m.style.color='#E24B4A';}}
  }catch(e){if(m){m.textContent='Error de conexión';m.style.color='#E24B4A';}}
}
